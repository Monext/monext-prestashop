stages:
  - test
  - build
  - upload
  - release

variables:
  # put composer cache inside project to improve portability on shared runners
  COMPOSER_CACHE_DIR: "$CI_PROJECT_DIR/.composer/cache"
  PACKAGE_VERSION : $CI_COMMIT_TAG
  FOLDER_NAME : "payline"
  MONEXT_ZIP_PACKAGE: "prestashop-monext-v${PACKAGE_VERSION}.zip"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/prestashop-monext-release/${PACKAGE_VERSION}"

phpunit:
  stage: test
  image: php:${PHP_VERSION}-cli
  # run the job in parallel for each PHP version
  parallel:
    matrix:
      - PHP_VERSION: "7.4"
      - PHP_VERSION: "8.0"
      - PHP_VERSION: "8.1"
      - PHP_VERSION: "8.2"
      - PHP_VERSION: "8.3"
      - PHP_VERSION: "8.4"

  cache:
    key: "${CI_JOB_NAME}-${PHP_VERSION}-${CI_COMMIT_REF_SLUG}"
    paths:
      - vendor/
      - .composer/cache/

  before_script:
    - apt-get update -yqq
    - apt-get install -y --no-install-recommends git unzip libicu-dev libonig-dev libzip-dev zlib1g-dev libxml2-dev curl
    - docker-php-ext-configure zip --with-libzip || true
    # install soap as well (nécessaire pour monext/monext-sdk)
    - docker-php-ext-install -j$(nproc) intl mbstring xml zip soap || true
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer --version
    - composer install --prefer-dist --no-progress --no-interaction

  script:
    # run your unit tests; the job (and pipeline) will fail if phpunit exits non-zero
    - ./vendor/bin/phpunit --colors=always

  rules:
    # Run pipeline when a Merge Request is created/updated (GitLab MR ~ GitHub PR)
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    # never run by default for other pipeline sources (adjust if you want pushes too)
    - when: never


#######
# Build
#######
build_job:
  stage: build
  image: composer:2.6
  before_script:
    - composer --version
    # Install SOAP extension required by monext/monext-php
    - apk add --no-cache libxml2-dev
    - docker-php-ext-install soap
  script:
    - composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
    - composer archive --file=${CI_PROJECT_ID} --format=zip
    - rm -rf $FOLDER_NAME && unzip ${CI_PROJECT_ID}.zip -d $FOLDER_NAME && rm ${CI_PROJECT_ID}.zip && zip -r $MONEXT_ZIP_PACKAGE $FOLDER_NAME && rm -rf $FOLDER_NAME
  artifacts:
    paths:
      - $MONEXT_ZIP_PACKAGE
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

upload:
  stage: upload
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build_job
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file $MONEXT_ZIP_PACKAGE "${PACKAGE_REGISTRY_URL}/${MONEXT_ZIP_PACKAGE}"

# Release stage
release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - echo "Creating release $CI_COMMIT_TAG"
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - upload
  release:
    name: "Release $CI_COMMIT_TAG "
    description: "For additionnal information please read the CHANGELOG."
    tag_name: $CI_COMMIT_TAG
    ref: $CI_COMMIT_SHA
    assets:
      links:
        - name: prestashop-monext-$CI_COMMIT_TAG (zip)
          url: "${PACKAGE_REGISTRY_URL}/${MONEXT_ZIP_PACKAGE}"
          link_type: package