# Landing page (What is Monext?)
payline_configuration_landing:
  path: /payline/configuration
  methods: [GET]
  defaults:
    _controller: 'PrestaShop\Module\Payline\Controller\Admin\PaylineConfigurationController::landing'
    _legacy_controller: AdminModules
    _legacy_link: AdminModules:configure:payline

# General configuration (credentials)
payline_configuration_general:
  path: /payline/configuration/general
  methods: [GET, POST]
  defaults:
    _controller: 'PrestaShop\Module\Payline\Controller\Admin\PaylineConfigurationController::general'
    _legacy_controller: AdminModules
    _legacy_link: AdminModules:configure:payline

